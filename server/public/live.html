<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Snow Media · Live Takeover</title>

<!-- PWA / add-to-home-screen (iOS + Android) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Live Takeover">
<meta name="theme-color" content="#001468">
<link rel="apple-touch-icon" href="/milos.jpg">
<link rel="icon" href="/favicon.png">
<link rel="manifest" href="/live.webmanifest">

<style>
  :root {
    --navy: #001468;
    --navy-2: #263B80;
    --gold: #FFB949;
    --gold-2: #EAB155;
    --gold-soft: #FFF3DC;
    --ink: #0B1437;
    --text: #3D4658;
    --text-2: #66728A;
    --text-3: #97A3B8;
    --line: #E2E8F2;
    --bg: #F0F6FB;
    --ok: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  .hidden { display: none !important; }

  /* Top bar */
  .topbar {
    background: linear-gradient(135deg, var(--navy-2), var(--navy));
    color: #fff; padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .topbar .back {
    background: rgba(255,255,255,0.15); border: none; color: #fff; width: 36px; height: 36px;
    border-radius: 10px; font-size: 20px; cursor: pointer; line-height: 1; flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: .2px; }
  .topbar .sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 1px; }
  .topbar .spacer { flex: 1; }
  .topbar .logout { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 12px; padding: 6px 10px; border-radius: 8px; cursor: pointer; }

  /* Login */
  #login { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  #login .card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 28px 22px; width: 100%; max-width: 360px; box-shadow: 0 20px 40px rgba(38,59,128,0.10); }
  #login h2 { color: var(--ink); font-size: 20px; margin-bottom: 6px; }
  #login p { color: var(--text-2); font-size: 13px; margin-bottom: 18px; }
  #login input { width: 100%; padding: 13px 14px; border: 1px solid var(--line); border-radius: 12px; font-size: 16px; color: var(--ink); outline: none; margin-bottom: 12px; }
  #login input:focus { border-color: var(--navy-2); }
  #login button { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), var(--gold-2)); color: var(--navy); border: none; border-radius: 9999px; font-size: 15px; font-weight: 700; cursor: pointer; }
  #login .err { color: #dc2626; font-size: 12px; margin-bottom: 10px; display: none; }

  /* Queue */
  #queue-view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .queue-empty { text-align: center; color: var(--text-3); padding: 60px 24px; font-size: 14px; }
  .qrow { background: #fff; border-bottom: 1px solid var(--line); padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; }
  .qrow:active { background: var(--gold-soft); }
  .qrow .qmain { flex: 1; min-width: 0; }
  .qrow .qname { font-weight: 700; color: var(--ink); font-size: 15px; }
  .qrow .qbiz { font-size: 12px; color: var(--text-2); }
  .qrow .qsnippet { font-size: 13px; color: var(--text); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .qrow .qmeta { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .qrow .qage { font-size: 11px; color: var(--text-3); }

  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 9999px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .badge.human { background: var(--ok); color: #fff; }
  .badge.requested { background: var(--gold); color: var(--navy); }
  .badge.ai { background: #eef2f8; color: var(--text-2); }
  .badge.signal { background: #FEE2E2; color: #b91c1c; }

  /* Conversation */
  #convo-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .convo-head { background: #fff; border-bottom: 1px solid var(--line); padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .convo-head .cinfo { flex: 1; min-width: 0; }
  .convo-head .cname { font-weight: 700; color: var(--ink); font-size: 15px; }
  .convo-head .cmeta { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .convo-head .toggle-btn { border: none; border-radius: 9999px; font-size: 13px; font-weight: 700; padding: 9px 16px; cursor: pointer; flex-shrink: 0; }
  .toggle-btn.take { background: var(--ok); color: #fff; }
  .toggle-btn.release { background: #fff; color: var(--navy); border: 2px solid var(--gold); }

  .transcript { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; display: flex; flex-direction: column; }
  .msg.user { align-self: flex-end; }
  .msg.ai, .msg.operator, .msg.system { align-self: flex-start; }
  .msg .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.45; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user .bubble { background: linear-gradient(135deg, var(--navy-2), var(--navy)); color: #fff; border-bottom-right-radius: 4px; }
  .msg.ai .bubble { background: #fff; color: var(--ink); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.operator .bubble { background: var(--gold-soft); color: var(--ink); border: 1px solid var(--gold); border-bottom-left-radius: 4px; }
  .msg.system .bubble { background: #eef2f8; color: var(--text-2); font-style: italic; }
  .msg .who { font-size: 10px; color: var(--text-3); margin: 0 6px 3px; text-transform: uppercase; letter-spacing: .4px; }
  .msg.user .who { text-align: right; }

  /* Composer */
  .composer { background: #fff; border-top: 1px solid var(--line); padding: 10px 12px max(10px, env(safe-area-inset-bottom)); flex-shrink: 0; }
  .snippets { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
  .snippet { flex-shrink: 0; background: #fff; border: 1px solid var(--gold); color: var(--navy); font-size: 12px; padding: 7px 12px; border-radius: 9999px; cursor: pointer; white-space: nowrap; }
  .snippet:active { background: var(--gold-soft); }
  .composer-row { display: flex; gap: 8px; align-items: flex-end; }
  .composer textarea { flex: 1; border: 1px solid var(--line); border-radius: 18px; padding: 11px 14px; font-size: 16px; font-family: inherit; color: var(--ink); outline: none; resize: none; max-height: 120px; }
  .composer textarea:focus { border-color: var(--navy-2); }
  .composer .send { width: 44px; height: 44px; flex-shrink: 0; border: none; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-2)); color: var(--navy); font-size: 20px; cursor: pointer; }
  .composer .send:disabled { opacity: .5; }
  .composer .hint { font-size: 11px; color: var(--text-3); padding: 4px 6px 0; }
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="card">
    <h2>Live Takeover</h2>
    <p>Enter your admin API key to jump into live conversations.</p>
    <div class="err" id="login-err">That key was rejected. Try again.</div>
    <input id="login-key" type="password" placeholder="Admin API key" autocomplete="current-password">
    <button id="login-btn">Enter</button>
  </div>
</div>

<!-- App (hidden until authed) -->
<div id="app" class="hidden" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">

  <div class="topbar">
    <button class="back hidden" id="back-btn" aria-label="Back">&#8592;</button>
    <div>
      <h1 id="topbar-title">Live Queue</h1>
      <div class="sub" id="topbar-sub">Conversations needing you</div>
    </div>
    <div class="spacer"></div>
    <button class="logout" id="logout-btn">Sign out</button>
  </div>

  <!-- Queue -->
  <div id="queue-view">
    <div class="queue-empty" id="queue-empty">Nothing waiting right now. New handoffs show up here automatically.</div>
    <div id="queue-list"></div>
  </div>

  <!-- Conversation -->
  <div id="convo-view" class="hidden">
    <div class="convo-head">
      <div class="cinfo">
        <div class="cname" id="c-name">&mdash;</div>
        <div class="cmeta" id="c-meta"></div>
      </div>
      <button class="toggle-btn take" id="mode-btn">Take over</button>
    </div>
    <div class="transcript" id="transcript"></div>
    <div class="composer">
      <div class="snippets" id="snippets"></div>
      <div class="composer-row">
        <textarea id="reply-input" rows="1" placeholder="Reply as Milos..."></textarea>
        <button class="send" id="send-btn" aria-label="Send">&#10148;</button>
      </div>
      <div class="hint" id="composer-hint">Sending a reply takes over the chat. The AI stays silent until you release it.</div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  var QUEUE_POLL_MS = 5000;
  var CONVO_POLL_MS = 4000;

  var SNIPPETS = [
    "Hey, Milos here, real person now. What's on your mind?",
    "Sorry the bot was going in circles. What were you actually after?",
    "Happy to jump on a quick call. Want to grab 15 min today?",
    "What's the best email for you? I'll follow up with specifics."
  ];

  var state = {
    key: localStorage.getItem('adminApiKey') || '',
    currentId: null,
    mode: 'ai',
    queueTimer: null,
    convoTimer: null,
    lastRenderCount: 0
  };

  // ---- DOM ----
  var $ = function (id) { return document.getElementById(id); };
  var loginEl = $('login'), appEl = $('app');
  var queueView = $('queue-view'), convoView = $('convo-view');

  // ---- API ----
  function apiFetch(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ 'X-Admin-Api-Key': state.key, 'Content-Type': 'application/json' }, opts.headers || {});
    return fetch(path, opts).then(function (res) {
      if (res.status === 401) { showLogin(true); throw new Error('unauthorized'); }
      return res;
    });
  }

  // ---- Auth ----
  function showLogin(isError) {
    stopConvoPoll(); stopQueuePoll();
    appEl.classList.add('hidden');
    loginEl.classList.remove('hidden');
    $('login-err').style.display = isError ? 'block' : 'none';
    $('login-key').value = '';
    $('login-key').focus();
  }

  function enterApp() {
    loginEl.classList.add('hidden');
    appEl.classList.remove('hidden');
    var deep = new URLSearchParams(location.search).get('c');
    if (deep) { openConvo(deep); }
    else { showQueue(); }
  }

  $('login-btn').addEventListener('click', function () {
    var key = $('login-key').value.trim();
    if (!key) return;
    state.key = key;
    // Validate against a cheap authed endpoint before committing.
    fetch('/api/admin/health', { headers: { 'X-Admin-Api-Key': key } }).then(function (res) {
      if (!res.ok) { $('login-err').style.display = 'block'; return; }
      localStorage.setItem('adminApiKey', key);
      enterApp();
    }).catch(function () { $('login-err').style.display = 'block'; });
  });
  $('login-key').addEventListener('keypress', function (e) { if (e.key === 'Enter') $('login-btn').click(); });
  $('logout-btn').addEventListener('click', function () { localStorage.removeItem('adminApiKey'); state.key = ''; showLogin(false); });

  // ---- View switching ----
  function showQueue() {
    state.currentId = null;
    stopConvoPoll();
    convoView.classList.add('hidden');
    queueView.classList.remove('hidden');
    $('back-btn').classList.add('hidden');
    $('topbar-title').textContent = 'Live Queue';
    $('topbar-sub').textContent = 'Conversations needing you';
    loadQueue();
    startQueuePoll();
  }
  $('back-btn').addEventListener('click', showQueue);

  // ---- Queue ----
  function startQueuePoll() { stopQueuePoll(); state.queueTimer = setInterval(loadQueue, QUEUE_POLL_MS); }
  function stopQueuePoll() { if (state.queueTimer) { clearInterval(state.queueTimer); state.queueTimer = null; } }

  function loadQueue() {
    apiFetch('/api/admin/live-queue').then(function (r) { return r.json(); }).then(function (data) {
      renderQueue(data.queue || []);
    }).catch(function () {});
  }

  function renderQueue(rows) {
    var list = $('queue-list');
    $('queue-empty').classList.toggle('hidden', rows.length > 0);
    list.innerHTML = '';
    rows.forEach(function (row) {
      var el = document.createElement('div');
      el.className = 'qrow';
      var badge = badgeFor(row);
      el.innerHTML =
        '<div class="qmain">' +
          '<div class="qname">' + esc(row.lead_name || 'Anonymous visitor') + '</div>' +
          '<div class="qbiz">' + esc(row.lead_business_type || row.lead_email || 'No details yet') + '</div>' +
          '<div class="qsnippet">' + esc(row.last_user || '') + '</div>' +
        '</div>' +
        '<div class="qmeta">' + badge + '<div class="qage">' + ago(row.updated_at) + '</div></div>';
      el.addEventListener('click', function () { openConvo(row.id); });
      list.appendChild(el);
    });
  }

  function badgeFor(row) {
    if (row.takeover_mode === 'human') return '<span class="badge human">Live</span>';
    if (row.takeover_mode === 'requested') return '<span class="badge requested">Wants you</span>';
    if (row.last_signal && row.last_signal.indexOf('hot_lead') === 0) return '<span class="badge signal">Hot lead</span>';
    if (row.last_signal && row.last_signal.indexOf('handoff') === 0) return '<span class="badge signal">Handoff</span>';
    return '<span class="badge ai">AI</span>';
  }

  // ---- Conversation ----
  function openConvo(id) {
    state.currentId = id;
    state.lastRenderCount = -1;
    stopQueuePoll();
    queueView.classList.add('hidden');
    convoView.classList.remove('hidden');
    $('back-btn').classList.remove('hidden');
    $('topbar-title').textContent = 'Conversation';
    $('topbar-sub').textContent = id.slice(0, 18) + '...';
    renderSnippets();
    loadConvo();
    startConvoPoll();
  }

  function startConvoPoll() { stopConvoPoll(); state.convoTimer = setInterval(loadConvo, CONVO_POLL_MS); }
  function stopConvoPoll() { if (state.convoTimer) { clearInterval(state.convoTimer); state.convoTimer = null; } }

  function loadConvo() {
    if (!state.currentId) return;
    apiFetch('/api/admin/conversations/' + encodeURIComponent(state.currentId))
      .then(function (r) { return r.json(); })
      .then(function (c) { renderConvo(c); })
      .catch(function () {});
  }

  function renderConvo(c) {
    state.mode = c.takeover_mode || 'ai';
    $('c-name').textContent = c.lead_name || 'Anonymous visitor';
    var metaParts = [];
    if (c.lead_business_type) metaParts.push(c.lead_business_type);
    if (c.lead_email) metaParts.push(c.lead_email);
    if (c.lead_phone) metaParts.push(c.lead_phone);
    $('c-meta').textContent = metaParts.join('  ·  ') || 'No contact captured yet';

    var btn = $('mode-btn');
    if (state.mode === 'human') {
      btn.textContent = 'Release to AI';
      btn.className = 'toggle-btn release';
    } else {
      btn.textContent = 'Take over';
      btn.className = 'toggle-btn take';
    }

    var msgs = c.messages || [];
    // Only re-render when the message count changed, to avoid clobbering scroll.
    if (msgs.length === state.lastRenderCount) return;
    var atBottom = isAtBottom();
    state.lastRenderCount = msgs.length;

    var t = $('transcript');
    t.innerHTML = '';
    msgs.forEach(function (m) {
      var kind = m.role === 'user' ? 'user' : (m.sender_type || 'ai');
      var who = kind === 'user' ? 'Visitor' : kind === 'operator' ? 'You' : kind === 'system' ? 'Auto' : 'AI';
      var wrap = document.createElement('div');
      wrap.className = 'msg ' + kind;
      wrap.innerHTML = '<div class="who">' + who + '</div><div class="bubble">' + esc(m.content) + '</div>';
      t.appendChild(wrap);
    });
    if (atBottom) t.scrollTop = t.scrollHeight;
  }

  function isAtBottom() {
    var t = $('transcript');
    return (t.scrollHeight - t.scrollTop - t.clientHeight) < 60;
  }

  // Take over / release
  $('mode-btn').addEventListener('click', function () {
    if (!state.currentId) return;
    var action = state.mode === 'human' ? 'release' : 'takeover';
    apiFetch('/api/admin/conversations/' + encodeURIComponent(state.currentId) + '/' + action, { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function () { state.lastRenderCount = -1; loadConvo(); })
      .catch(function () {});
  });

  // Reply
  function sendReply() {
    var input = $('reply-input');
    var content = input.value.trim();
    if (!content || !state.currentId) return;
    $('send-btn').disabled = true;
    apiFetch('/api/admin/conversations/' + encodeURIComponent(state.currentId) + '/operator-message', {
      method: 'POST', body: JSON.stringify({ content: content })
    }).then(function (r) { return r.json(); }).then(function () {
      input.value = ''; input.style.height = 'auto';
      state.lastRenderCount = -1; loadConvo();
    }).catch(function () {}).then(function () { $('send-btn').disabled = false; });
  }
  $('send-btn').addEventListener('click', sendReply);
  $('reply-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  });
  $('reply-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  function renderSnippets() {
    var box = $('snippets');
    box.innerHTML = '';
    SNIPPETS.forEach(function (s) {
      var el = document.createElement('button');
      el.className = 'snippet';
      el.textContent = s;
      el.addEventListener('click', function () {
        var input = $('reply-input');
        input.value = s;
        input.focus();
        input.dispatchEvent(new Event('input'));
      });
      box.appendChild(el);
    });
  }

  // Pause polling when the tab is hidden; resume on return.
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) { stopQueuePoll(); stopConvoPoll(); }
    else if (!loginEl.classList.contains('hidden')) { /* still logged out */ }
    else if (state.currentId) { loadConvo(); startConvoPoll(); }
    else { loadQueue(); startQueuePoll(); }
  });

  // ---- utils ----
  function esc(s) { var d = document.createElement('div'); d.textContent = (s == null ? '' : String(s)); return d.innerHTML; }
  function ago(ts) {
    if (!ts) return '';
    var then = new Date(ts.replace(' ', 'T') + (ts.indexOf('Z') < 0 ? 'Z' : ''));
    var secs = Math.max(0, Math.floor((Date.now() - then.getTime()) / 1000));
    if (secs < 60) return secs + 's';
    if (secs < 3600) return Math.floor(secs / 60) + 'm';
    if (secs < 86400) return Math.floor(secs / 3600) + 'h';
    return Math.floor(secs / 86400) + 'd';
  }

  // ---- boot ----
  if (state.key) { enterApp(); } else { showLogin(false); }
})();
</script>
</body>
</html>
